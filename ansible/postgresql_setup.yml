---
- name: "Postgresql Setup"
  hosts: DB
  become: yes
  
  vars: 
    postgresql_global_config_options:
      - option: unix_socket_directories
        value: '/var/run/postgresql'
      - option: log_directory
        value: "{{ 'log' if ansible_os_family == 'RedHat' else '/var/log/postgresql' }}"
      - option: listen_addresses
        value: "*"

    postgresql_hba_entries:
      - { type: local, database: all, user: postgres, address: '', auth_method: peer }
      - { type: host,  database: all, user: all, address: '127.0.0.1/32', auth_method: md5 }
      - { type: host,  database: all, user: all, address: '::1/128', auth_method: md5 }
      - { type: host,  database: all, user: postgres, address: '0.0.0.0/0', auth_method: reject }
      - { type: host,  database: all, user: all, address: '0.0.0.0/0', auth_method: md5 }

    postgresql_users:
      - name: "postgres"
        password: "{{ lookup('env', 'POSTGRES_ADMIN_PASSWORD') }}"
      - name: "{{ lookup('env', 'DB_USER') }}"
        password: "{{ lookup('env', 'DB_PASS') }}"

    postgresql_databases:
      - name: "{{ lookup('env', 'DB_NAME') }}"
        owner: "{{ lookup('env', 'DB_USER') }}"

  roles:
    - geerlingguy.postgresql 


